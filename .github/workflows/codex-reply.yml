name: Shared Codex Review Reply

on:
  workflow_call:
    inputs:
      codex_model:
        type: string
        default: gpt-5.5
      allowed_reply_associations_json:
        type: string
        default: '["MEMBER","OWNER","COLLABORATOR"]'
    secrets:
      OPENAI_API_KEY:
        required: true

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: codex-reply-${{ github.event.comment.id || github.run_id }}
  cancel-in-progress: true

jobs:
  gate:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.evaluate.outputs.should_run }}
      gate_reason: ${{ steps.evaluate.outputs.gate_reason }}
      author_association: ${{ steps.evaluate.outputs.author_association }}
    steps:
      - name: Evaluate reply gate
        id: evaluate
        uses: actions/github-script@v7
        env:
          ALLOWED_REPLY_ASSOCIATIONS_JSON: ${{ inputs.allowed_reply_associations_json }}
        with:
          script: |
            const expectedCommand = '#codex-reply';
            const comment = context.payload.comment;
            const commentId = comment?.id ? String(comment.id) : '';
            const body = comment?.body || '';
            const commandMatches = body.startsWith(expectedCommand);
            const eventAssociation = comment?.author_association || '';
            let association = eventAssociation;
            let repoPermission = '';
            let repoRoleName = '';
            let allowedAssociations = [];
            let gateReason = 'ok';

            try {
              allowedAssociations = JSON.parse(process.env.ALLOWED_REPLY_ASSOCIATIONS_JSON || '[]');
              if (!Array.isArray(allowedAssociations)) {
                throw new Error('allowed associations input must be a JSON array');
              }
            } catch (err) {
              gateReason = 'invalid_allowed_associations';
              core.warning(`Unable to parse allowed reply associations: ${err.message}`);
            }

            if (comment && commandMatches && gateReason === 'ok' && commentId && !allowedAssociations.includes(association)) {
              const response = await github.rest.pulls.getReviewComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: Number(commentId),
              });
              association = response.data.author_association || '';
              core.info('Fetched review comment via REST because event author_association was missing or not allowed.');
            }

            let trustedAuthor = allowedAssociations.includes(association);
            if (comment && commandMatches && gateReason === 'ok' && !trustedAuthor) {
              const author = comment.user?.login || '';
              if (author) {
                try {
                  const response = await github.rest.repos.getCollaboratorPermissionLevel({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    username: author,
                  });
                  repoPermission = response.data.permission || '';
                  repoRoleName = response.data.role_name || '';
                  trustedAuthor = ['admin', 'write'].includes(repoPermission);
                } catch (err) {
                  if (err.status === 404) {
                    core.info(`No repository permission found for "${author}".`);
                  } else {
                    core.warning(`Unable to resolve repository permission for "${author}": ${err.message}`);
                  }
                }
              }
            }

            let shouldRun = commandMatches && trustedAuthor && gateReason === 'ok';

            if (!comment) {
              gateReason = 'missing_comment';
              shouldRun = false;
            } else if (!commandMatches) {
              gateReason = 'bad_command';
              shouldRun = false;
            } else if (gateReason === 'ok' && !trustedAuthor) {
              gateReason = 'untrusted_comment_author';
              shouldRun = false;
            }

            core.info(`Gate event_name: ${context.eventName}`);
            core.info(`Gate comment_id: ${commentId}`);
            core.info(`Gate comment_body: ${body}`);
            core.info(`Gate command_matches: ${String(commandMatches)}`);
            core.info(`Gate event_author_association: ${eventAssociation}`);
            core.info(`Gate resolved_author_association: ${association}`);
            core.info(`Gate resolved_repo_permission: ${repoPermission}`);
            core.info(`Gate resolved_repo_role_name: ${repoRoleName}`);
            core.info(`Gate allowed_associations_input: ${process.env.ALLOWED_REPLY_ASSOCIATIONS_JSON || ''}`);
            core.info(`Gate should_run: ${String(shouldRun)}`);
            core.info(`Gate reason: ${gateReason}`);

            core.setOutput('should_run', String(shouldRun));
            core.setOutput('gate_reason', gateReason);
            core.setOutput('author_association', association);

  codex-reply:
    needs: gate
    if: needs.gate.outputs.should_run == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Resolve thread context
        id: context
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const triggerComment = context.payload.comment;

            if (!pr || !triggerComment) {
              core.setFailed('Missing pull request review comment context.');
              return;
            }

            const comments = await github.paginate(
              github.rest.pulls.listReviewComments,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr.number,
                per_page: 100,
              },
            );

            const rootId = triggerComment.in_reply_to_id || triggerComment.id;
            const threadComments = comments
              .filter((c) => c.id === rootId || c.in_reply_to_id === rootId)
              .sort((a, b) => Date.parse(a.created_at) - Date.parse(b.created_at));

            const originalComment = threadComments.find((c) => c.id === rootId) || triggerComment;
            const developerResponse = triggerComment.body.replace(/^#codex-reply[^\n]*\n?/i, '').trim();

            const threadSummary = threadComments.map((c) => ({
              id: c.id,
              author: c.user?.login || 'unknown',
              body: c.body || '',
              created_at: c.created_at,
              in_reply_to_id: c.in_reply_to_id || null,
            }));

            core.setOutput('pull_number', String(pr.number));
            core.setOutput('base_sha', pr.base?.sha || '');
            core.setOutput('head_sha', pr.head?.sha || '');
            core.setOutput('trigger_comment_id', String(triggerComment.id));
            core.setOutput('trigger_author', triggerComment.user?.login || 'unknown');
            core.setOutput('developer_response', developerResponse);
            core.setOutput('original_comment', originalComment.body || '');
            core.setOutput('thread_summary', JSON.stringify(threadSummary));

      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.context.outputs.head_sha }}
          fetch-depth: 0

      - name: Fetch PR base and head
        shell: bash
        run: |
          git fetch --no-tags origin ${{ steps.context.outputs.base_sha }}
          git fetch --no-tags origin ${{ steps.context.outputs.head_sha }}

      - name: Build Codex follow-up prompt
        shell: bash
        env:
          BASE_SHA: ${{ steps.context.outputs.base_sha }}
          HEAD_SHA: ${{ steps.context.outputs.head_sha }}
          ORIGINAL_COMMENT: ${{ steps.context.outputs.original_comment }}
          DEVELOPER_RESPONSE: ${{ steps.context.outputs.developer_response }}
          THREAD_SUMMARY: ${{ steps.context.outputs.thread_summary }}
        run: |
          python3 - <<'PY'
          import os

          prompt = """You are reviewing a developer's response to a prior Codex review comment in a PR thread.

          Task:
          - Evaluate whether the developer response is technically correct based on repository code and the PR diff.
          - Actively verify claims by checking relevant code paths/usages in the repository instead of only restating uncertainty.
          - Return one verdict: AGREE, DISAGREE, or NEEDS_INFO.
          - Provide concise reasoning and concrete file evidence.
          - Only return NEEDS_INFO after attempting repository-based verification and finding that evidence is still insufficient.

          Required output format (strict JSON only, no markdown):
          {
            "verdict": "AGREE | DISAGREE | NEEDS_INFO",
            "reasoning": "short explanation",
            "evidence": [
              {
                "path": "relative/path",
                "line": 123,
                "detail": "what this line proves"
              }
            ],
            "recommended_action": "what reviewer/author should do next"
          }

          Constraints:
          - Base conclusions on repository files and this PR diff only.
          - Do not invent files or lines.
          - Keep reasoning concise and technical.
          - For dependency/safety questions (for example, exception-type dependencies), check in-repo call sites/catch sites before concluding.
          - Do not ask the developer for proof if repository evidence already supports a verdict.
          """

          with open("/tmp/codex_reply_prompt.md", "w", encoding="utf-8") as f:
              f.write(prompt)
              f.write("\n\nPR diff boundary:\n")
              f.write(f"git diff {os.getenv('BASE_SHA','')}...{os.getenv('HEAD_SHA','')}\n\n")
              f.write("Original codex review comment:\n")
              f.write(os.getenv("ORIGINAL_COMMENT", ""))
              f.write("\n\nDeveloper response (trigger comment body without command):\n")
              f.write(os.getenv("DEVELOPER_RESPONSE", ""))
              f.write("\n\nThread comments (JSON):\n")
              f.write(os.getenv("THREAD_SUMMARY", "[]"))
              f.write("\n")
          PY

      - name: Verify Codex secret availability
        shell: bash
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          if [ -z "${OPENAI_API_KEY}" ]; then
            echo "OPENAI_API_KEY is unavailable in this workflow run context."
            exit 1
          fi

      - name: Run Codex follow-up
        id: codex
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          model: ${{ inputs.codex_model }}
          prompt-file: /tmp/codex_reply_prompt.md
          sandbox: read-only

      - name: Post thread reply
        uses: actions/github-script@v7
        env:
          CODEX_RAW: ${{ steps.codex.outputs.final-message }}
          PULL_NUMBER: ${{ steps.context.outputs.pull_number }}
          COMMENT_ID: ${{ steps.context.outputs.trigger_comment_id }}
        with:
          script: |
            const raw = process.env.CODEX_RAW || '';
            let verdict = 'NEEDS_INFO';
            let reasoning = 'Codex reply was not parseable.';
            let evidence = [];
            let recommendedAction = 'Please re-run #codex-reply with additional context.';

            try {
              const parsed = JSON.parse(raw);
              verdict = parsed.verdict || verdict;
              reasoning = parsed.reasoning || reasoning;
              evidence = Array.isArray(parsed.evidence) ? parsed.evidence : [];
              recommendedAction = parsed.recommended_action || recommendedAction;
            } catch (err) {
              reasoning = `Codex output was not valid JSON. Raw output preserved below.\n\n${raw}`;
            }

            const evidenceLines = evidence
              .filter((e) => e && e.path && Number.isInteger(e.line))
              .map((e) => `- \`${e.path}:${e.line}\` - ${e.detail || ''}`);

            const footer = verdict === 'AGREE'
              ? 'If this addresses your concern, please mark this thread as resolved.'
              : '';

            const body = [
              `Codex follow-up verdict: **${verdict}**`,
              '',
              reasoning,
              '',
              evidenceLines.length ? '**Evidence**' : '',
              ...evidenceLines,
              evidenceLines.length ? '' : '',
              `**Recommended action**: ${recommendedAction}`,
              footer,
            ].filter(Boolean).join('\n');

            await github.rest.pulls.createReplyForReviewComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: Number(process.env.PULL_NUMBER),
              comment_id: Number(process.env.COMMENT_ID),
              body,
            });
